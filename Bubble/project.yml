name: Bubble
options:
  bundleIdPrefix: com.bubble
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

packages:
  HotKey:
    url: https://github.com/soffes/HotKey
    from: "0.2.0"

targets:
  Bubble:
    type: application
    platform: macOS
    sources:
      - Bubble
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bubble.promptmanager
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        INFOPLIST_FILE: Bubble/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Bubble/Bubble.entitlements
        ENABLE_HARDENED_RUNTIME: true
    dependencies:
      - package: HotKey
    entitlements:
      path: Bubble/Bubble.entitlements
      properties:
        com.apple.security.app-sandbox: false

  BubbleTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - BubbleTests
    dependencies:
      - target: Bubble
    settings:
      base:
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: true
